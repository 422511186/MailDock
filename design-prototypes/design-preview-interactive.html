<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailDock 交互式设计原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac',
              400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slide-in-right { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    .animate-slide-in-right { animation: slide-in-right 0.3s ease-out; }
    .page { display: none; }
    .page.active { display: block; }

    /* 导航栏 */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
    }
    .nav-bar button {
      padding: 8px 16px;
      margin: 0 4px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .nav-bar button:hover { background: #f8fafc; }
    .nav-bar button.active { background: #10b981; color: white; border-color: #10b981; }

    .content-wrapper { margin-top: 60px; }
  </style>
</head>
<body class="bg-slate-50">

  <!-- 顶部导航栏 -->
  <nav class="nav-bar">
    <div class="flex flex-wrap items-center gap-2">
      <span class="text-sm font-semibold text-slate-600 mr-2">页面导航：</span>
      <button onclick="showPage('login-desktop')" class="active">登录(桌面)</button>
      <button onclick="showPage('login-mobile')">登录(移动)</button>
      <button onclick="showPage('accounts')">账号列表</button>
      <button onclick="showPage('mails')">邮件列表</button>
      <button onclick="showPage('profile')">个人中心</button>
      <button onclick="showPage('components')">组件库</button>
    </div>
  </nav>

  <div class="content-wrapper">

    <!-- 1. 登录页（桌面端） -->
    <div id="login-desktop" class="page active">
      <div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 p-8">
        <div class="w-full max-w-lg rounded-3xl border border-slate-200/80 bg-white/95 p-12 shadow-2xl shadow-slate-300/50 backdrop-blur-sm">
          <div class="mb-12 text-center">
            <h1 class="text-4xl font-bold text-slate-800">登录</h1>
          </div>

          <div class="space-y-4">
            <button type="button" class="flex w-full items-center justify-center gap-3 rounded-2xl border-2 border-slate-200 bg-white px-6 py-4 text-base font-medium text-slate-700 shadow-sm transition hover:border-slate-300 hover:bg-slate-50 hover:shadow-md">
              <img src="https://cdn3.ldstatic.com/original/4X/d/1/4/d146c68151340881c884d95e0da4acdf369258c6.png" alt="LinuxDO" class="h-6 w-6" />
              <span>使用 LinuxDO 继续</span>
            </button>

            <div class="relative my-8">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
              </div>
              <div class="relative flex justify-center text-base">
                <span class="bg-white px-6 text-slate-500">或</span>
              </div>
            </div>

            <button type="button" onclick="showPage('accounts')" class="flex w-full items-center justify-center gap-3 rounded-2xl bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4 text-base font-semibold text-white shadow-lg shadow-blue-600/40 transition hover:from-blue-700 hover:to-blue-800 hover:shadow-xl hover:shadow-blue-600/50">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <span>使用 邮箱或用户名 登录</span>
            </button>

            <div class="mt-6 text-center">
              <span class="text-sm text-slate-500">没有账户？</span>
              <button type="button" class="ml-1 text-sm font-medium text-blue-600 transition hover:text-blue-700">注册</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. 登录页（移动端） -->
    <div id="login-mobile" class="page">
      <div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 p-4">
        <div class="w-full max-w-sm rounded-3xl border border-slate-200/80 bg-white/95 p-8 shadow-2xl shadow-slate-300/50 backdrop-blur-sm">
          <div class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-800">登录</h1>
          </div>

          <div class="space-y-3">
            <button type="button" class="flex w-full items-center justify-center gap-2.5 rounded-2xl border-2 border-slate-200 bg-white px-5 py-3.5 text-sm font-medium text-slate-700 shadow-sm transition hover:border-slate-300 hover:bg-slate-50">
              <img src="https://cdn3.ldstatic.com/original/4X/d/1/4/d146c68151340881c884d95e0da4acdf369258c6.png" alt="LinuxDO" class="h-5 w-5" />
              <span>使用 LinuxDO 继续</span>
            </button>

            <div class="relative my-6">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="bg-white px-4 text-slate-500">或</span>
              </div>
            </div>

            <button type="button" onclick="showPage('accounts')" class="flex w-full items-center justify-center gap-2.5 rounded-2xl bg-gradient-to-r from-blue-600 to-blue-700 px-5 py-3.5 text-sm font-semibold text-white shadow-lg shadow-blue-600/40 transition hover:from-blue-700 hover:to-blue-800">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
              <span>使用 邮箱或用户名 登录</span>
            </button>

            <div class="mt-5 text-center">
              <span class="text-xs text-slate-500">没有账户？</span>
              <button type="button" class="ml-1 text-xs font-medium text-blue-600">注册</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. 账号列表页 -->
    <div id="accounts" class="page">
      <!-- Header with dropdown -->
      <header class="sticky top-[60px] z-20 flex items-center justify-between gap-4 border-b border-slate-200/80 bg-white/95 px-6 py-3 shadow-sm backdrop-blur-md">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 text-white shadow-lg shadow-emerald-500/30">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <div class="flex flex-col leading-tight">
            <span class="text-base font-bold tracking-tight text-slate-800">MailDock</span>
            <span class="text-xs text-slate-400">邮箱管理中心</span>
          </div>
        </div>

        <div class="relative">
          <button type="button" onclick="toggleDropdown()" class="flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 transition hover:border-slate-300 hover:shadow-sm">
            <img src="https://avatars.githubusercontent.com/u/1" alt="" class="h-7 w-7 rounded-full object-cover ring-2 ring-white" />
            <span class="text-sm font-medium text-slate-700">huangzy</span>
            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <div id="user-dropdown" class="absolute right-0 top-full z-30 mt-2 hidden w-64 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl shadow-slate-300/50 animate-fade-in">
            <div class="border-b border-slate-100 bg-gradient-to-br from-slate-50 to-white p-4">
              <div class="flex items-center gap-3">
                <img src="https://avatars.githubusercontent.com/u/1" alt="" class="h-12 w-12 rounded-full object-cover ring-2 ring-white shadow-md" />
                <div class="flex-1 overflow-hidden">
                  <div class="truncate font-semibold text-slate-800">huangzy</div>
                  <div class="truncate text-xs text-slate-500">iog9k1h...@privaterelay.linux.do</div>
                </div>
              </div>
            </div>

            <div class="p-2">
              <button onclick="showPage('profile')" class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm text-slate-700 transition hover:bg-slate-50">
                <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span>个人中心</span>
              </button>
              <button onclick="showPage('mails')" class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm text-slate-700 transition hover:bg-slate-50">
                <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
                <span>邮件列表</span>
              </button>
              <button onclick="showPage('login-desktop'); toggleDropdown()" class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm text-rose-600 transition hover:bg-rose-50">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                <span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="p-6">
        <div class="mx-auto max-w-5xl">
          <!-- 工具栏 -->
          <div class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex flex-wrap items-center gap-3">
              <div class="relative flex-1 min-w-[240px]">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                  <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                </div>
                <input type="text" placeholder="搜索邮箱地址..." class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-10 pr-4 text-sm" />
              </div>
              <div class="flex gap-2">
                <button class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700">
                  <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  批量测活
                </button>
                <button class="inline-flex items-center gap-2 rounded-lg border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-medium text-rose-600">
                  <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                  批量删除
                </button>
                <button class="inline-flex items-center gap-2 rounded-lg bg-gradient-to-r from-emerald-500 to-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-emerald-500/30">
                  <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                  </svg>
                  添加账号
                </button>
              </div>
            </div>
          </div>

          <!-- 表格 -->
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-slate-100 bg-gradient-to-br from-slate-50 to-white">
                  <th class="px-4 py-3 text-center"><input type="checkbox" class="h-4 w-4 rounded" /></th>
                  <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-slate-500">邮箱地址</th>
                  <th class="px-4 py-3 text-center text-xs font-semibold uppercase text-slate-500">状态</th>
                  <th class="px-4 py-3 text-center text-xs font-semibold uppercase text-slate-500">邮件数</th>
                  <th class="px-4 py-3 text-center text-xs font-semibold uppercase text-slate-500">最后同步</th>
                </tr>
              </thead>
              <tbody>
                <tr class="cursor-pointer border-b border-slate-50 transition hover:bg-emerald-50/50" onclick="showPage('mails')">
                  <td class="px-4 py-3 text-center"><input type="checkbox" class="h-4 w-4 rounded" /></td>
                  <td class="px-4 py-3">
                    <div class="flex items-center gap-3">
                      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-blue-600 text-sm font-semibold text-white shadow-md">A</div>
                      <span class="font-medium text-slate-800">alice@163.com</span>
                    </div>
                  </td>
                  <td class="px-4 py-3 text-center">
                    <span class="inline-flex items-center gap-1 rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">
                      <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>正常
                    </span>
                  </td>
                  <td class="px-4 py-3 text-center text-slate-700">128</td>
                  <td class="px-4 py-3 text-center text-slate-500">2 分钟前</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. 邮件列表页 -->
    <div id="mails" class="page">
      <header class="sticky top-[60px] z-20 border-b border-slate-100 bg-gradient-to-br from-slate-50 to-white px-6 py-4">
        <div class="flex items-center justify-between">
          <h2 class="flex items-center gap-2 text-lg font-semibold text-slate-800">
            <svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            alice@163.com
          </h2>
          <button onclick="showPage('accounts')" class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-700">返回</button>
        </div>
      </header>

      <div class="mx-auto max-w-5xl p-6">
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <div class="divide-y divide-slate-50">
            <div class="group cursor-pointer bg-blue-50/30 p-4 transition hover:bg-blue-50/50">
              <div class="flex items-start gap-4">
                <div class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-emerald-500 to-emerald-600 text-sm font-semibold text-white shadow-md">J</div>
                <div class="flex-1">
                  <div class="mb-1 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                      <span class="h-2 w-2 rounded-full bg-blue-500"></span>
                      <span class="font-semibold text-slate-800">John Doe</span>
                    </div>
                    <span class="text-xs text-slate-500">10:24</span>
                  </div>

                  <div class="truncate text-sm text-slate-500">尊敬的用户，我们将在今晚进行系统升级...</div>
                </div>
              </div>
            </div>
          </div>

      </div>
    </div>

    <!-- 5. 个人中心页 -->
    <div id="profile" class="page">
      <div class="mx-auto max-w-4xl p-6">
        <h1 class="mb-6 text-2xl font-bold text-slate-800">个人中心</h1>

        <section class="mb-6 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <div class="border-b border-slate-100 bg-gradient-to-br from-slate-50 to-white px-6 py-4">
            <h2 class="text-base font-semibold text-slate-800">资料与头像</h2>
          </div>
          <div class="p-6">
            <div class="flex flex-col items-center gap-4 text-center">
              <img src="https://avatars.githubusercontent.com/u/1" alt="" class="h-20 w-20 rounded-2xl object-cover shadow-lg ring-2 ring-slate-100" />
              <dl class="text-sm">
                <dt class="text-slate-500">邮箱</dt>
                <dd class="text-slate-700">iog9k1h...@privaterelay.linux.do</dd>
              </dl>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- 6. 组件库 -->
    <div id="components" class="page">
      <div class="mx-auto max-w-4xl p-6">
        <h1 class="mb-6 text-2xl font-bold text-slate-800">组件库</h1>

        <div class="mb-6 rounded-2xl border border-slate-200 bg-white p-6">
          <h3 class="mb-4 font-semibold">Toast 提示</h3>
          <div class="space-y-3">
            <div class="flex items-start gap-3 rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
              <div class="flex h-6 w-6 items-center justify-center rounded-full bg-emerald-500 text-white">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <div class="flex-1">
                <div class="font-medium text-emerald-800">操作成功</div>
                <div class="text-sm text-emerald-700">资料已更新</div>
              </div>
            </div>
          </div>
        </div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6">
          <h3 class="mb-4 font-semibold">按钮组</h3>
          <div class="flex flex-wrap gap-3">
            <button class="rounded-xl bg-gradient-to-r from-emerald-500 to-emerald-600 px-5 py-2.5 text-sm font-semibold text-white shadow-lg">Primary</button>
            <button class="rounded-xl border border-slate-200 px-5 py-2.5 text-sm font-medium text-slate-700">Secondary</button>
            <button class="rounded-xl bg-rose-50 px-5 py-2.5 text-sm font-medium text-rose-600">Danger</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function showPage(pageId) {
      // 隐藏所有页面
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      // 显示目标页面
      document.getElementById(pageId).classList.add('active');
      // 更新导航按钮状态
      document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      // 关闭下拉菜单
      document.getElementById('user-dropdown').classList.add('hidden');
      // 滚动到顶部
      window.scrollTo(0, 0);
    }

    function toggleDropdown() {
      document.getElementById('user-dropdown').classList.toggle('hidden');
    }

    // 点击外部关闭下拉菜单
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('user-dropdown');
      const button = e.target.closest('button[onclick="toggleDropdown()"]');
      if (!dropdown.contains(e.target) && !button) {
        dropdown.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
